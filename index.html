<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOO BOARD DASHBOARD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap');
        
        :root {
            --dj-purple: #351c61; 
            --dj-yellow: #f8c117; 
            --dj-orange: #f24b0f; 
            --dj-cyan: #00a3d2;   
            --dj-magenta: #d91c49; 
            --dj-bg: #f4f5f8; 
            --dj-grid: #e8eaef; 
            --white: #ffffff; 
            --black: #111111;
            --dj-navy: #15162c; /* EXTENSION 딥 네이비 컬러 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--dj-bg); 
            background-image: repeating-linear-gradient(
                -45deg, 
                transparent, 
                transparent 15px, 
                rgba(53, 28, 97, 0.03) 15px, 
                rgba(53, 28, 97, 0.03) 30px
            );
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 2vh 10px; overflow: hidden;
        }
        
        .game-frame {
            width: 100%; max-width: 850px; height: 96vh;
            background-color: var(--white);
            background-image: 
                linear-gradient(var(--dj-grid) 1px, transparent 1px), 
                linear-gradient(90deg, var(--dj-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            /* EXTENSION 감성: 아우터 테두리를 딥 네이비로 변경 */
            border: 10px solid var(--dj-navy);
            border-radius: 16px;
            position: relative; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15), inset 0 0 0 4px #f0f2f5;
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        
        .game-frame:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.2), inset 0 0 0 4px #f0f2f5;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(53,28,97,0.03) 50%, rgba(53,28,97,0.03));
            background-size: 100% 4px; z-index: 1; pointer-events: none;
        }

        .djmax-bg-text {
            position: absolute; top: 20%; right: -5%; z-index: 0;
            display: flex; flex-direction: column; pointer-events: none;
            transform: rotate(-10deg); opacity: 0.05;
        }
        .djmax-bg-text span {
            font-family: 'Montserrat', sans-serif; font-size: 180px; font-weight: 900; line-height: 0.8;
            letter-spacing: -10px; color: var(--dj-purple);
        }
        .djmax-bg-text .hollow {
            color: transparent; -webkit-text-stroke: 4px var(--dj-purple); margin-left: 80px;
            font-style: italic;
        }

        .floating-sym { position: absolute; font-family: 'Montserrat', sans-serif; font-weight: 900; z-index: 1; opacity: 0.15; pointer-events: none; }
        .sym-1 { color: var(--dj-magenta); font-size: 120px; top: 5%; right: 10%; animation: float1 6s infinite alternate ease-in-out; }
        .sym-2 { color: var(--dj-cyan); font-size: 80px; bottom: 30%; left: 2%; transform: rotate(15deg); animation: float2 5s infinite alternate ease-in-out; }
        .sym-3 { color: var(--dj-yellow); font-size: 150px; top: 40%; left: 40%; animation: float3 8s infinite alternate ease-in-out; }
        
        @keyframes float1 { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(30px) rotate(15deg); } }
        @keyframes float2 { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-40px) scale(1.1); } }
        @keyframes float3 { 0% { transform: rotate(0deg) scale(0.9); } 100% { transform: rotate(45deg) scale(1.05); } }

        .hud-overlay {
            position: absolute; top: 15px; bottom: 15px; left: 15px; right: 15px;
            pointer-events: none; z-index: 5; border: 1px solid rgba(53, 28, 97, 0.1);
        }
        .hud-corner { position: absolute; width: 12px; height: 12px; border: 2px solid var(--dj-purple); }
        .hud-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .hud-top { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; align-items: center; gap: 15px; }
        .hud-badge {
            border: 2px solid var(--dj-purple); padding: 3px 10px;
            font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900;
            color: var(--dj-purple); background: var(--white); letter-spacing: 1px;
        }
        .hud-line { flex: 1; height: 1px; background: var(--dj-purple); opacity: 0.2; }
        .hud-cross { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; color: var(--dj-magenta); }

        .eq-bars { display: flex; gap: 3px; align-items: flex-end; height: 14px; opacity: 0.8; }
        .eq-bar { width: 4px; background: var(--dj-cyan); border-radius: 2px; animation: eq-play 1s infinite alternate; }
        .eq-bar:nth-child(1) { background: var(--dj-magenta); animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { background: var(--dj-yellow); animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { background: var(--dj-cyan); animation-delay: 0.0s; }
        .eq-bar:nth-child(4) { background: var(--dj-orange); animation-delay: 0.4s; }
        .eq-bar:nth-child(5) { background: var(--dj-purple); animation-delay: 0.2s; }
        @keyframes eq-play { 0% { height: 4px; } 100% { height: 14px; } }

        .content-wrap { position: relative; padding: 45px 30px 45px; z-index: 10; display: flex; flex-direction: column; flex: 1; min-height: 0; }

        .top-header-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; gap: 20px; position: relative; }
        .header-titles { display: flex; flex-direction: column; position: relative; flex: 1; height: 188px; justify-content: flex-end; padding-bottom: 2px; }
        
        .deco-dot-matrix { position: absolute; width: 80px; height: 80px; background-image: radial-gradient(var(--dj-cyan) 20%, transparent 20%); background-size: 10px 10px; top: 10px; left: 280px; z-index: 0; opacity: 0.7; }
        .deco-star { position: absolute; width: 40px; height: 40px; background: var(--dj-magenta); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); top: 35px; left: 400px; z-index: 2; animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .top-subtitle { position: absolute; top: 10px; left: 5px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 900; color: var(--dj-purple); letter-spacing: 2px; opacity: 0.8; display: flex; align-items: center; gap: 15px; z-index: 2; }
        .top-subtitle .barcode { font-size: 18px; letter-spacing: 3px; color: var(--dj-cyan); opacity: 0.8; }

        /* 🔥 수정: 세련된 네이비 배경 + 미세한 매트릭스 격자 애니메이션 추가 */
        .ext-bg-typo {
            position: absolute; top: 35px; left: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 65px; font-weight: 900;
            line-height: 1; letter-spacing: -2px; transform: skewX(-5deg) rotate(-2deg);
            pointer-events: none; user-select: none; z-index: 0;
        }
        .ext-bg-typo .dark-box {
            position: relative;
            background: linear-gradient(135deg, #1d2242, #2c3258); /* 기존 검정 느낌에서 세련된 딥 네이비로 변경 */
            color: var(--white);
            padding: 8px 25px;
            display: flex; flex-direction: row; gap: 15px; align-items: center;
            box-shadow: 6px 6px 0 rgba(21, 22, 44, 0.15); 
            overflow: hidden; /* 격자가 박스 밖으로 튀어나가지 않게 고정 */
        }
        
        /* 은은한 매트릭스 격자 무한 스크롤 효과 (위로 올라감) */
        .ext-bg-typo .dark-box::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 8px 8px;
            animation: matrix-scroll 3s linear infinite;
            z-index: 1;
        }
        @keyframes matrix-scroll {
            from { background-position: 0 0; }
            to { background-position: 0 -40px; } /* 위로 무한 이동 */
        }
        
        .ext-bg-typo .dark-box span {
            position: relative; z-index: 2; /* 글자가 격자 위로 올라오게 처리 */
        }

        .ext-bg-typo-sym {
            position: absolute; font-family: 'Montserrat', sans-serif; font-weight: 900;
        }
        .ext-bg-typo-sym.plus {
            font-size: 65px; color: var(--dj-yellow);
            top: -35px; right: -25px; transform: rotate(15deg);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }
        .ext-bg-typo-sym.cross {
            font-size: 55px; color: var(--dj-magenta);
            bottom: -20px; right: -20px; /* 오른쪽 아래 구석으로 이동 */
            transform: rotate(-10deg);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            z-index: 3;
        }

        /* 🔥 작아지고 탭 위로 일렬 이동한 타이틀 디자인 (유튜브 박스와 하단 정렬) */
        .header-title-row { 
            position: relative; display: flex; align-items: baseline; gap: 15px; 
            margin-bottom: 0; margin-left: 5px; z-index: 10; cursor: default !important; 
        }
        .header-title-row * { cursor: default !important; }
        
        .header-title-row h1 { 
            font-size: 55px; font-weight: 900; font-style: italic; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; line-height: 1; position: relative; z-index: 5;
            letter-spacing: -3px; margin: 0; display: flex; gap: 12px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .header-title-row h1 span {
            /* EXTENSION 미니멀 테두리 (네이비 + 쿨그레이 조합) */
            text-shadow: 3px 3px 0 var(--dj-navy), 6px 6px 0 #c4c8d1, 9px 9px 0 rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        /* 로고 호버 시 통통 튀는 효과 */
        .header-title-row:hover h1 { transform: translateY(-2px) scale(1.02) rotate(-1deg); }
        .header-title-row:hover h1 span { text-shadow: 4px 4px 0 var(--dj-navy), 8px 8px 0 #c4c8d1, 12px 12px 0 rgba(0,0,0,0.15); }
        
        /* 마우스 직접 닿았을 때 개별 글자가 더 튀어오름 */
        .header-title-row h1 span:hover { transform: translateY(-4px) scale(1.05) rotate(2deg); cursor: pointer !important;}
        
        /* 미니멀 꾸밈 블록 */
        .mini-block-navy { width: 30px; height: 15px; background: var(--dj-navy); transform: skewX(-15deg); margin-bottom: 8px;}
        .mini-block-grey { width: 15px; height: 15px; background: #c4c8d1; border-radius: 50%; margin-bottom: 8px;}

        .yt-box-mini { 
            width: 320px; height: 180px; flex-shrink: 0; background: var(--black); border: 4px solid var(--dj-navy); 
            box-shadow: 5px 5px 0 var(--dj-cyan), -2px -2px 0 var(--dj-magenta); padding: 4px; overflow: hidden; transform: skewX(-2deg); 
            transition: transform 0.3s ease; position: relative; z-index: 10; margin-top: 0;
        }
        .yt-box-mini:hover { transform: skewX(0deg); box-shadow: 6px 6px 0 var(--dj-cyan), -3px -3px 0 var(--dj-magenta); }
        .yt-box-mini iframe { width: 100%; height: 100%; transform: skewX(2deg); display: block; transition: transform 0.3s ease; }
        .yt-box-mini:hover iframe { transform: skewX(0deg); }

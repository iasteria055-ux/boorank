<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOO BOARD DASHBOARD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap'); /* 말풍선용 귀여운 폰트 */
        
        :root {
            --dj-purple: #351c61; 
            --dj-yellow: #f8c117; 
            --dj-orange: #f24b0f; 
            --dj-cyan: #00a3d2;   
            --dj-magenta: #d91c49; 
            --dj-bg: #f2f3f7; 
            --dj-grid: #e8eaef; 
            --white: #ffffff; 
            --black: #111111;
            --dj-navy: #15162c; /* EXTENSION 테두리용 딥 네이비 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--dj-bg); 
            background-image: repeating-linear-gradient(-45deg, rgba(53, 28, 97, 0.04) 0, rgba(53, 28, 97, 0.04) 1px, transparent 1px, transparent 15px);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 2vh 10px; overflow: hidden;
        }
        
        .game-frame {
            width: 100%; max-width: 850px; height: 96vh;
            background-color: var(--white);
            background-image: 
                linear-gradient(var(--dj-grid) 1px, transparent 1px), 
                linear-gradient(90deg, var(--dj-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            border: 10px solid var(--dj-navy); /* EXTENSION 감성 테두리 */
            border-radius: 16px;
            position: relative; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15), inset 0 0 0 4px #f0f2f5;
            display: flex; flex-direction: column;
        }

        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(53,28,97,0.03) 50%, rgba(53,28,97,0.03)); background-size: 100% 4px; z-index: 1; pointer-events: none; }

        .djmax-bg-text { position: absolute; top: 15%; right: -10%; z-index: 0; display: flex; flex-direction: column; pointer-events: none; transform: rotate(-10deg); opacity: 0.04; }
        .djmax-bg-text span { font-family: 'Montserrat', sans-serif; font-size: 220px; font-weight: 900; line-height: 0.8; letter-spacing: -15px; color: var(--dj-purple); }
        .djmax-bg-text .hollow { color: transparent; -webkit-text-stroke: 5px var(--dj-purple); margin-left: 100px; font-style: italic; }

        .floating-sym { position: absolute; font-family: 'Montserrat', sans-serif; font-weight: 900; z-index: 1; opacity: 0.15; pointer-events: none; }
        .sym-1 { color: var(--dj-magenta); font-size: 140px; top: 5%; right: 8%; animation: float1 6s infinite alternate ease-in-out; }
        .sym-2 { color: var(--dj-cyan); font-size: 100px; bottom: 25%; left: 2%; transform: rotate(15deg); animation: float2 5s infinite alternate ease-in-out; }
        .sym-3 { color: var(--dj-yellow); font-size: 180px; top: 35%; left: 35%; animation: float3 8s infinite alternate ease-in-out; }
        
        @keyframes float1 { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(30px) rotate(15deg); } }
        @keyframes float2 { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-40px) scale(1.1); } }
        @keyframes float3 { 0% { transform: rotate(0deg) scale(0.9); } 100% { transform: rotate(45deg) scale(1.05); } }

        .hud-overlay { position: absolute; top: 15px; bottom: 15px; left: 15px; right: 15px; pointer-events: none; z-index: 5; border: 1px solid rgba(53, 28, 97, 0.1); }
        .hud-corner { position: absolute; width: 12px; height: 12px; border: 2px solid var(--dj-purple); }
        .hud-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        .hud-top { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; align-items: center; gap: 15px; }
        .hud-badge { border: 2px solid var(--dj-purple); padding: 3px 10px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; color: var(--dj-purple); background: var(--white); letter-spacing: 1px; }
        .hud-line { flex: 1; height: 1px; background: var(--dj-purple); opacity: 0.2; }
        .hud-cross { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; color: var(--dj-magenta); }

        .eq-bars { display: flex; gap: 3px; align-items: flex-end; height: 14px; opacity: 0.8; }
        .eq-bar { width: 4px; background: var(--dj-cyan); border-radius: 2px; animation: eq-play 1s infinite alternate; }
        .eq-bar:nth-child(1) { background: var(--dj-magenta); animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { background: var(--dj-yellow); animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { background: var(--dj-cyan); animation-delay: 0.0s; }
        .eq-bar:nth-child(4) { background: var(--dj-orange); animation-delay: 0.4s; }
        .eq-bar:nth-child(5) { background: var(--dj-purple); animation-delay: 0.2s; }
        @keyframes eq-play { 0% { height: 4px; } 100% { height: 14px; } }

        .content-wrap { position: relative; padding: 45px 30px 45px; z-index: 10; display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .top-header-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 20px; }
        .header-titles { display: flex; flex-direction: column; position: relative; padding-top: 10px; flex: 1; }
        
        .deco-dot-matrix { position: absolute; width: 80px; height: 80px; background-image: radial-gradient(var(--dj-cyan) 20%, transparent 20%); background-size: 10px 10px; top: 10px; left: 180px; z-index: 0; opacity: 0.7; }
        .deco-star { position: absolute; width: 30px; height: 30px; background: var(--dj-magenta); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); top: 35px; left: 280px; z-index: 2; animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .deco-crosshair { position: absolute; width: 45px; height: 45px; border: 3px solid var(--dj-cyan); border-radius: 50%; top: -10px; left: 140px; z-index: 0; opacity: 0.6; display: flex; justify-content: center; align-items: center; }
        .deco-crosshair::before { content: ''; width: 3px; height: 100%; background: var(--dj-cyan); }
        .deco-crosshair::after { content: ''; width: 100%; height: 3px; background: var(--dj-cyan); position: absolute; }
        .deco-stripe-box { position: absolute; width: 90px; height: 25px; background: repeating-linear-gradient(-45deg, var(--dj-orange), var(--dj-orange) 4px, transparent 4px, transparent 8px); bottom: -10px; left: -10px; z-index: 0; transform: skewX(-15deg); }

        .top-subtitle { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 900; color: var(--dj-purple); letter-spacing: 2px; opacity: 0.8; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; margin-left: 5px; position: relative; z-index: 2; }
        .top-subtitle .barcode { font-size: 16px; letter-spacing: 3px; color: var(--dj-cyan); opacity: 0.8; }

        .header { position: relative; display: inline-block; cursor: default; z-index: 2; margin-top: 0; width: 100%; }
        .block-cyan { position: absolute; width: 50px; height: 25px; background: var(--dj-cyan); top: -2px; left: -5px; z-index: 1; transform: skewX(-15deg); box-shadow: 3px 3px 0 var(--dj-purple); }
        
        /* 🔥 EXTENSION 감성: 딥 네이비 테두리 & 통통 튀는 애니메이션 */
        .header h1 { 
            font-size: 85px; font-weight: 900; font-style: italic; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; line-height: 0.85; position: relative; z-index: 5;
            letter-spacing: -3px; color: var(--dj-yellow);
            text-shadow: 
                5px 5px 0 var(--dj-navy), 
                -4px -4px 0 var(--dj-cyan), 
                4px -4px 0 var(--dj-magenta), 
                8px 8px 0 rgba(0,0,0,0.15);
            margin: 0; padding-left: 5px; white-space: nowrap;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.4s ease;
        }

        .header:hover h1 {
            transform: translateY(-4px) scale(1.02) rotate(-2deg);
            text-shadow: 
                7px 7px 0 var(--dj-navy), 
                -5px -5px 0 var(--dj-cyan), 
                5px -5px 0 var(--dj-magenta), 
                10px 10px 0 rgba(0,0,0,0.2);
        }

        .yt-box-mini { width: 300px; height: 168px; flex-shrink: 0; background: var(--black); border: 4px solid var(--dj-navy); box-shadow: 5px 5px 0 var(--dj-cyan), -2px -2px 0 var(--dj-magenta); padding: 4px; overflow: hidden; transform: skewX(-2deg); transition: transform 0.3s ease; position: relative; z-index: 10; margin-top: 10px; }
        .yt-box-mini:hover { transform: skewX(0deg); box-shadow: 6px 6px 0 var(--dj-cyan), -3px -3px 0 var(--dj-magenta); }
        .yt-box-mini iframe { width: 100%; height: 100%; transform: skewX(2deg); display: block; transition: transform 0.3s ease; }
        .yt-box-mini:hover iframe { transform: skewX(0deg); }

        .tab-menu { display: flex; gap: 12px; margin-bottom: 15px; position: relative; z-index: 10;}
        .tab-btn { flex: 1; padding: 12px; background: var(--white); border: 3px solid var(--dj-purple); box-shadow: 4px 4px 0 var(--dj-purple); font-size: 16px; font-weight: 900; font-style: italic; font-family: 'Montserrat', sans-serif; color: var(--dj-purple); transform: skewX(-8deg); transition: all 0.2s; position: relative; overflow: hidden; }
        .tab-btn span { display: inline-block; transform: skewX(8deg); position: relative; z-index: 2;}
        .tab-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(53, 28, 97, 0.05) 10px, rgba(53, 28, 97, 0.05) 20px); transition: left 0.3s; z-index: 1; }
        .tab-btn:hover::before { left: 0; }
        .tab-btn:hover { transform: skewX(-8deg) translateY(-2px); box-shadow: 5px 5px 0 var(--dj-magenta); color: var(--dj-magenta); border-color: var(--dj-magenta); }
        .tab-btn.active { background: var(--dj-purple); color: var(--dj-yellow); box-shadow: 4px 4px 0 var(--dj-cyan); border-color: var(--dj-purple); }
        .tab-btn#btnQuest.active { color: var(--dj-cyan); box-shadow: 4px 4px 0 var(--dj-cyan); }

        .list-container { 
            display: flex; gap: 15px; /* 좌(랭킹), 우(코멘트) 분할 */
            flex: 1; overflow: hidden; position: relative; z-index: 10; padding-bottom: 5px;
        }

        /* 왼쪽 랭킹 영역 */
        .rank-column {
            flex: 1; display: flex; flex-direction: column; gap: 8px;
            overflow-y: auto; padding-right: 5px;
        }
        .rank-column::-webkit-scrollbar { width: 6px; }
        .rank-column::-webkit-scrollbar-track { background: rgba(53, 28, 97, 0.05); border-radius: 4px; }
        .rank-column::-webkit-scrollbar-thumb { background: var(--dj-purple); border-radius: 4px; }

        /* 오른쪽 코멘트 영역 */
        .comment-column {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
            gap: 15px; overflow-y: hidden; padding: 10px; position: relative;
            background: rgba(255, 255, 255, 0.4); border: 2px dashed var(--dj-grid); border-radius: 12px;
        }
        
        /* 둥둥 떠다니는 귀여운 코멘트 말풍선 */
        .boo-comment {
            font-family: 'Jua', sans-serif; /* 동글동글 귀여운 폰트 */
            font-size: 20px; color: var(--dj-purple);
            background: #fff; padding: 10px 15px; border-radius: 20px;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.05), inset -2px -2px 0 rgba(0,0,0,0.05);
            border: 2px solid var(--dj-navy);
            display: inline-block; position: absolute;
            white-space: nowrap; cursor: default;
            animation: floatBubble 4s ease-in-out infinite alternate;
        }
        /* 마젠타, 시안, 오렌지 포인트 조합 */
        .boo-comment:nth-child(odd) { border-color: var(--dj-magenta); color: var(--dj-magenta); }
        .boo-comment:nth-child(3n) { border-color: var(--dj-cyan); color: var(--dj-cyan); }
        .boo-comment:nth-child(4n) { border-color: var(--dj-orange); color: var(--dj-orange); }

        @keyframes floatBubble {
            0% { transform: translateY(0px) rotate(-2deg); }
            100% { transform: translateY(-15px) rotate(2deg); }
        }

        /* -------------------------------------
           랭킹 줄 스타일 및 커서 고정
        -------------------------------------- */
        .rank-row, .rank-row * { cursor: default !important; }
        .tab-btn, .tab-btn * { cursor: pointer !important; }

        .rank-row { 
            display: flex; align-items: center; background: var(--white); 
            border: 1px solid var(--dj-purple) !important; border-left: 6px solid var(--dj-purple) !important;
            padding: 8px 12px; font-weight: 900; flex-shrink: 0; transform: skewX(-2deg); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, background-color 0.2s; position: relative; overflow: hidden;
        }
        .rank-row::after { content: ''; position: absolute; right: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, transparent, rgba(53, 28, 97, 0.05)); transition: width 0.3s ease; z-index: 0; pointer-events: none; }
        .rank-row:hover::after { width: 100%; }
        
        .giver-list .rank-row { border-left-color: var(--dj-orange) !important; box-shadow: 2px 2px 0 var(--dj-orange); }
        .quest-list .rank-row { border-left-color: var(--dj-cyan) !important; box-shadow: 2px 2px 0 var(--dj-cyan); }
        .rank-row:hover { transform: skewX(-2deg) translateX(5px) translateY(-1px); }
        .giver-list .rank-row:hover { box-shadow: -2px 4px 0 var(--dj-orange); background: #fffcf7; }
        .quest-list .rank-row:hover { box-shadow: -2px 4px 0 var(--dj-cyan); background: #f5ffff; }

        .rank-row.top-1 { background: repeating-linear-gradient(-45deg, #fff9e6, #fff9e6 8px, #ffffff 8px, #ffffff 16px); border-color: #d4af37 !important; border-left-color: #d4af37 !important; box-shadow: 2px 2px 0 #d4af37; }
        .rank-row.top-2 { background: repeating-linear-gradient(-45deg, #f5f5f5, #f5f5f5 8px, #ffffff 8px, #ffffff 16px); border-color: #a8a9ad !important; border-left-color: #a8a9ad !important; box-shadow: 2px 2px 0 #a8a9ad; }
        .rank-row.top-3 { background: repeating-linear-gradient(-45deg, #fff0e6, #fff0e6 8px, #ffffff 8px, #ffffff 16px); border-color: #cd7f32 !important; border-left-color: #cd7f32 !important; box-shadow: 2px 2px 0 #cd7f32; }

        .rank-row-top { display: flex; align-items: center; flex: 1; min-width: 0; transform: skewX(2deg); }

        .mobile-comment { display: none; } /* 데스크탑에서는 숨김 */

        .rank-num { font-size: 18px; color: #ccc; width: 40px; font-style: italic; font-family: 'Montserrat', sans-serif; white-space: nowrap; position: relative; z-index: 2; }
        .rank-row.top-1 .rank-num { color: #d4af37; width: 60px; text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
        .rank-row.top-2 .rank-num { color: #a8a9ad; width: 60px; }
        .rank-row.top-3 .rank-num { color: #cd7f32; width: 60px; text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
        
        .rank-name { flex: 1; font-size: 14px; color: var(--dj-purple); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 5px; position: relative; z-index: 2; }
        .rank-val { font-size: 16px; font-style: italic; font-family: 'Montserrat', sans-serif; text-align: right; white-space: nowrap; transform: skewX(2deg); position: relative; z-index: 2; }

        .val-daily { color: var(--dj-magenta); }
        .val-giver { color: var(--dj-orange); }
        .val-quest { color: var(--dj-cyan); }

        .bouncy-text { display: inline-block; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s, text-shadow 0.2s; }
        .rank-row:hover .rank-name .bouncy-text { color: var(--dj-magenta); transform: translateY(-3px) scale(1.05); text-shadow: 0 2px 4px rgba(217, 28, 73, 0.3); }
        .rank-row:hover .rank-val .bouncy-text { color: var(--dj-purple); transform: translateY(-3px) scale(1.05); text-shadow: 0 2px 4px rgba(53, 28, 97, 0.3); }

        .thank-you-msg { text-align: center; margin-top: auto; padding-top: 15px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; color: var(--dj-purple); letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; position: relative; z-index: 10; }
        .marquee-wrap { position: absolute; bottom: 0; left: 0; width: 100%; height: 26px; background: var(--dj-navy); color: var(--dj-orange); display: flex; align-items: center; overflow: hidden; z-index: 20; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 2px; border-top: 1px solid var(--dj-purple); }
        .marquee-content { display: flex; white-space: nowrap; animation: scroll-left 15s linear infinite; }
        .marquee-content span { padding: 0 30px; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        @media (max-width: 700px) {
            .djmax-bg-text, .sym-3 { display: none; } 
            .game-frame { border-width: 6px; border-radius: 12px; }
            .content-wrap { padding: 30px 15px 35px; }
            .top-header-area { flex-direction: column; align-items: flex-start; gap: 15px; margin-bottom: 15px; }
            .header h1 { font-size: 55px; text-shadow: 3px 3px 0 var(--dj-purple), 4px 4px 0 rgba(0,0,0,0.15); letter-spacing: -2px; }
            .yt-box-mini { width: 100%; height: 180px; transform: skewX(0); margin-top: 0; }
            .yt-box-mini iframe { transform: skewX(0); }
            
            /* 모바일 공간 부족으로 우측 코멘트 열 숨김 */
            .comment-column { display: none; }

            /* 🔥 모바일에서 1층: 닉네임+수치, 2층: 코멘트 배치 */
            .rank-row {
                flex-direction: column;
                align-items: stretch;
                padding: 10px 12px;
                gap: 0;
                transform: skewX(0); /* 쏠림 현상 방지 */
            }
            .rank-row-top {
                display: flex;
                align-items: center;
                width: 100%;
                transform: skewX(0);
            }
            .rank-num {
                width: 35px;
                font-size: 15px;
            }
            .rank-row.top-1 .rank-num, 
            .rank-row.top-2 .rank-num, 
            .rank-row.top-3 .rank-num {
                width: 50px;
                font-size: 15px;
            }
            .rank-name {
                font-size: 15px;
                flex: 1;
            }
            .rank-val {
                text-align: right;
                width: auto;
                font-size: 14px;
                transform: skewX(0);
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }
            /* 모바일 전용 2층 코멘트 디자인 */
            .mobile-comment {
                display: block;
                width: 100%;
                text-align: left;
                font-family: 'Jua', sans-serif;
                font-size: 14px;
                color: rgba(53, 28, 97, 0.8);
                margin-top: 6px;
                padding-top: 6px;
                border-top: 1px dashed rgba(53, 28, 97, 0.15);
                padding-left: 35px; /* 순위 여백만큼 띄움 */
            }
        }
    </style>
</head>
<body>
    <div class="game-frame">
        <div class="scanlines"></div>
        <div class="djmax-bg-text"><span>RANK</span><span class="hollow">+ING</span></div>
        <div class="floating-sym sym-1">+</div><div class="floating-sym sym-2">X</div><div class="floating-sym sym-3">O</div>

        <div class="hud-overlay">
            <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
            <div class="hud-corner bl"></div><div class="hud-corner br"></div>
            <div class="hud-top">
                <div class="hud-badge">MINERAL STORAGE</div>
                <div class="hud-line"></div>
                <div class="eq-bars">
                    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                </div>
                <div class="hud-cross">+</div>
            </div>
        </div>

        <div class="content-wrap">
            <div class="top-header-area">
                <div class="header-titles">
                    <div class="deco-crosshair"></div><div class="deco-dot-matrix"></div><div class="deco-star"></div><div class="deco-stripe-box"></div>
                    <div class="top-subtitle">
                        <span>YGOSU</span><span class="barcode">|||| || ||| |</span><span>DATA ARCHIVE</span>
                    </div>
                    <div class="header">
                        <div class="block-cyan"></div>
                        <h1>BOO<br><span style="color: var(--dj-yellow);">BOARD</span></h1>
                    </div>
                </div>
                <div class="yt-box-mini">
                    <iframe src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" id="btnDaily" onclick="show('daily')"><span class="bouncy-text">DAILY QUEST</span></button>
                <button class="tab-btn" id="btnGiver" onclick="show('giver')"><span class="bouncy-text">DONATION</span></button>
                <button class="tab-btn" id="btnQuest" onclick="show('quest')"><span class="bouncy-text">REWARDS</span></button>
            </div>

            <!-- 반으로 나뉜 레이아웃 구조 (좌측 랭킹, 우측 코멘트) -->
            <div id="daily" class="list-container daily-list">
                <div class="rank-column" id="daily-ranks"></div>
                <div class="comment-column" id="daily-comments"></div>
            </div>
            
            <div id="giver" class="list-container giver-list" style="display:none;">
                <div class="rank-column" id="giver-ranks"></div>
                <div class="comment-column" id="giver-comments"></div>
            </div>
            
            <div id="quest" class="list-container quest-list" style="display:none;">
                <div class="rank-column" id="quest-ranks"></div>
                <div class="comment-column" id="quest-comments"></div>
            </div>

            <div class="thank-you-msg">★ THANK YOU FOR COMPLETING THE DAILY QUEST! ★</div>
        </div>

        <div class="marquee-wrap">
            <div class="marquee-content">
                <span>/// YGOSU BOO BOARD DATA ARCHIVE ///</span><span>DAILY QUEST ACHIEVERS</span><span>DONATION RANKING</span><span>MINERAL REWARDS</span>
                <span>/// YGOSU BOO BOARD DATA ARCHIVE ///</span><span>DAILY QUEST ACHIEVERS</span><span>DONATION RANKING</span><span>MINERAL REWARDS</span>
            </div>
        </div>
    </div>

    <script>
        // 랜덤 브금 리스트
        const bgmList = ["upNRraLNEg4", "56jjrn5BpDk", "NzcJWgK2ZTI", "qZlu2j2SiBA", "ZbO9PBdFRdc", "BMA5fYUfXq0"];
        function setRandomBGM() {
            const randomId = bgmList[Math.floor(Math.random() * bgmList.length)];
            const iframe = document.querySelector('.yt-box-mini iframe');
            iframe.src = `https://www.youtube.com/embed/${randomId}?si=iRSunb6wWGX7SGp5&autoplay=1&loop=1&playlist=${randomId}`;
        }

        // 탭 전환
        function show(tab) {
            document.getElementById('daily').style.display = 'none';
            document.getElementById('giver').style.display = 'none';
            document.getElementById('quest').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tab).style.display = 'flex';
            document.getElementById('btn' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        }

        // 10% 게임, 30% 팬심/주접, 60% 망령 비율로 구성된 칭호 리스트 (요청 문구 포함!)
        const booTitles = [
            // 팬심 / 주접 (30%)
            "부우단 행동대장 =_=", "윤랑바라기", "충성충성 부우충성", "(숨참고 부우 다이브)", "부우야 나 죽어 =_=",
            "세상에서 제일 귀여운 =_=", "부우만 믿고 간다", "성덕이 될 거야", "하랑이 미모 무슨 일 =_=",
            
            // 인방 / 게시판 망령 (60%)
            "숲(SOOP) 지박령", "부우 게시판 망령 =_=", "일퀘 깎는 장인", "방송 언제 켜? =_=", "시그 장전 완료",
            "방방봐 해주세요", "억까 멈춰! =_=", "채팅창 핑퐁 장인", "오늘도 출첵 완료!", "표정 풀어 =_=",
            "(부우 몰래 딴방 구경)", "일퀘 스피드런 1위", "퇴근 후 부우방송", "오늘도 폼 미쳤다 =_=", "현생은 폼인가",
            "내일부터 갓생산다 =_=", "미네랄 폭격기", "부우 게시판 수호자",
            "부우라고 하지좀마", "억까들 오ㅡㅡㅡㅡㅡㅡㅡ열", // <- 추가된 멘트들!
            
            // 게임 (10%)
            "부우는 롤 좋아해 =_=", "부우는 배그 좋아해 =_=", "넵! 알겠습니다!"
        ];

        // 데이터 렌더링 및 둥둥 코멘트 자동 생성 로직
        function renderData(dataList, typeClass, tabType, rankTarget, commentTarget) {
            let htmlRanks = "";
            let htmlComments = "";
            
            if (!dataList || dataList.length === 0) {
                document.getElementById(rankTarget).innerHTML = '<div style="text-align:center; padding:20px; color:#999; font-weight:900;">조건을 달성한 사람이 아직 없습니다.</div>';
                return;
            }

            dataList.forEach(function(r, i) {
                // 랭킹 카드 구조 (모바일 2줄 대응을 위해 구조화)
                var rankClass = "";
                var rankIcon = String(i + 1).padStart(2, '0');
                if (i === 0) { rankClass = "top-1"; rankIcon = "🥇 01"; }
                else if (i === 1) { rankClass = "top-2"; rankIcon = "🥈 02"; }
                else if (i === 2) { rankClass = "top-3"; rankIcon = "🥉 03"; }

                var nameHtml = '<span class="bouncy-text">' + r.name + '</span>';
                var valHtml = (tabType === 'daily') ? "CLEAR" : (r.val.toLocaleString() + " MN");

                var randomTitle = booTitles[Math.floor(Math.random() * booTitles.length)];

                htmlRanks += '<div class="rank-row ' + rankClass + '">' +
                        '<div class="rank-row-top">' +
                        '<div class="rank-num">' + rankIcon + '</div>' +
                        '<div class="rank-name">' + nameHtml + '</div>' +
                        '<div class="rank-val ' + typeClass + '"><span class="bouncy-text">' + valHtml + '</span></div>' +
                        '</div>' +
                        '<div class="mobile-comment">"' + randomTitle + '"</div>' +
                        '</div>';
                
                // 우측 떠다니는 말풍선 동적 생성
                var randomTop = Math.floor(Math.random() * 80) + "%"; // 0%~80% 사이 세로 랜덤
                var randomLeft = Math.floor(Math.random() * 50) + "%"; // 0%~50% 사이 가로 랜덤
                var randomDelay = (Math.random() * 3).toFixed(2) + "s"; // 시간 차 애니메이션
                
                htmlComments += '<div class="boo-comment" style="top:' + randomTop + '; left:' + randomLeft + '; animation-delay:' + randomDelay + ';">"' + randomTitle + '"</div>';
            });

            document.getElementById(rankTarget).innerHTML = htmlRanks;
            // 코멘트 말풍선 수량을 깔끔하게 최대 12개로 가공하여 주입
            document.getElementById(commentTarget).innerHTML = htmlComments;
        }

        function loadData() {
            fetch('data.json?t=' + new Date().getTime())
            .then(function(response) { if (!response.ok) throw new Error('네트워크 응답 실패'); return response.json(); })
            .then(function(data) {
                renderData(data.quest_board, "val-daily", "daily", "daily-ranks", "daily-comments");
                renderData(data.donation_ranking, "val-giver", "giver", "giver-ranks", "giver-comments");
                renderData(data.quest_ranking, "val-quest", "quest", "quest-ranks", "quest-comments");
            })
            .catch(function(error) {
                console.error("데이터 로딩 오류:", error);
            });
        }

        window.onload = function() {
            show('daily');
            loadData();
            setRandomBGM(); // 새로고침할 때마다 배경음악 랜덤 교체
        };
    </script>
</body>
</html>

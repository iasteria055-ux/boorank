<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOO BOARD DASHBOARD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap');

        :root {
            --dj-purple: #351c61; --dj-yellow: #f8c117; --dj-orange: #ea5920;
            --dj-cyan: #1ebfd4; --dj-magenta: #e62253; --dj-bg: #f2f3f7;
            --dj-grid: #e8eaef; --white: #ffffff; --black: #111111;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--dj-bg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 2vh 10px; overflow: hidden;
        }

        .game-frame {
            width: 100%; max-width: 800px; height: 100%;
            display: flex; flex-direction: column;
            background-color: var(--white);
            background-image:
                linear-gradient(var(--dj-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--dj-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            border: 12px solid var(--dj-purple);
            border-radius: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 0 0 3px #f0f2f5;
        }

        /* HUD 오버레이 */
        .hud-overlay {
            position: absolute; top: 18px; bottom: 18px; left: 18px; right: 18px;
            pointer-events: none; z-index: 5; border: 1px solid rgba(53, 28, 97, 0.1);
        }
        .hud-corner { position: absolute; width: 12px; height: 12px; border: 2px solid var(--dj-purple); }
        .hud-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .hud-top { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; align-items: center; gap: 15px; }
        .hud-bottom { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; align-items: center; gap: 15px; }

        .hud-badge {
            border: 2px solid var(--dj-purple); padding: 2px 10px;
            font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900;
            color: var(--dj-purple); background: var(--white);
        }
        .hud-line { flex: 1; height: 1px; background: var(--dj-purple); opacity: 0.2; }
        .hud-cross { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; color: var(--dj-magenta); }

        .hud-side {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 900;
            color: var(--dj-purple); letter-spacing: 6px; opacity: 0.3;
            writing-mode: vertical-rl; text-orientation: mixed;
        }
        .hud-side.left { left: 15px; transform: translateY(-50%) rotate(180deg); }
        .hud-side.right { right: 15px; }

        .eq-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; opacity: 0.8; }
        .eq-bar { width: 4px; background: var(--dj-cyan); border-radius: 2px; animation: eq-play 1s infinite alternate; }
        .eq-bar:nth-child(1) { background: var(--dj-magenta); animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { background: var(--dj-yellow); animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { background: var(--dj-cyan); animation-delay: 0.0s; }
        .eq-bar:nth-child(4) { background: var(--dj-orange); animation-delay: 0.4s; }
        .eq-bar:nth-child(5) { background: var(--dj-purple); animation-delay: 0.2s; }
        @keyframes eq-play { 0% { height: 4px; } 100% { height: 16px; } }

        .content-wrap { position: relative; padding: 65px 45px 40px; z-index: 10; display: flex; flex-direction: column; flex: 1; min-height: 0; }

        .top-subtitle {
            font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 900;
            color: var(--dj-purple); letter-spacing: 2px; opacity: 0.6;
            display: flex; align-items: center; gap: 12px; margin-bottom: 5px; margin-left: 5px;
        }
        .top-subtitle .barcode { font-size: 14px; letter-spacing: 3px; color: var(--dj-cyan); opacity: 0.8; }

        .header { margin-bottom: 25px; position: relative; z-index: 10; display: inline-block; cursor: default; align-self: flex-start; flex-shrink: 0; }
        .block-cyan { position: absolute; width: 50px; height: 30px; background: var(--dj-cyan); top: -10px; left: -10px; z-index: 1; }
        .block-orange { position: absolute; width: 45px; height: 45px; background: var(--dj-orange); bottom: -5px; right: -15px; z-index: 1; }
        .block-lines { position: absolute; width: 60px; height: 15px; background: repeating-linear-gradient(90deg, var(--dj-purple), var(--dj-purple) 2px, transparent 2px, transparent 6px); top: 15px; right: -70px; z-index: 1; opacity: 0.4; }

        .header h1 {
            font-size: 76px; font-weight: 900; font-style: italic; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; line-height: 0.9; position: relative; z-index: 5;
            letter-spacing: -3px; color: var(--dj-yellow);
            text-shadow: 4px 4px 0 var(--dj-purple), 8px 8px 0 rgba(0,0,0,0.1);
        }

        .yt-box {
            background: var(--black); border: 4px solid var(--dj-purple);
            box-shadow: 8px 8px 0 rgba(53, 28, 97, 0.3), -4px -4px 0 var(--dj-cyan);
            margin-bottom: 30px; padding: 4px; overflow: hidden; position: relative; z-index: 10; flex-shrink: 0;
            transform: skewX(-2deg);
        }
        .yt-box iframe { transform: skewX(2deg); display: block; }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 25px; position: relative; z-index: 10; flex-shrink: 0; }
        .tab-btn {
            flex: 1; padding: 12px 5px; background: var(--white);
            border: 3px solid var(--dj-purple); box-shadow: 4px 4px 0 var(--dj-purple);
            font-size: 16px; font-weight: 900; font-style: italic; font-family: 'Montserrat', sans-serif;
            color: var(--dj-purple); cursor: pointer; transform: skewX(-10deg); transition: all 0.2s; position: relative; overflow: hidden;
        }
        .tab-btn span { display: inline-block; transform: skewX(10deg); }
        .tab-btn:hover { transform: skewX(-10deg) translateY(-2px); box-shadow: 6px 6px 0 var(--dj-magenta); color: var(--dj-magenta); border-color: var(--dj-magenta); }
        .tab-btn:active { transform: skewX(-10deg) translate(2px, 2px); box-shadow: 2px 2px 0 var(--dj-purple); }
        .tab-btn.active { background: var(--dj-purple); color: var(--dj-yellow); box-shadow: 4px 4px 0 var(--dj-yellow); border-color: var(--dj-purple); }
        .tab-btn#btnQuest.active { color: var(--dj-cyan); box-shadow: 4px 4px 0 var(--dj-cyan); }

        .list-container {
            display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 10;
            flex: 1; min-height: 0; overflow-y: auto; padding-right: 15px;
        }
        .list-container::-webkit-scrollbar { width: 8px; }
        .list-container::-webkit-scrollbar-track { background: rgba(53, 28, 97, 0.05); border-radius: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--dj-purple); border-radius: 4px; }

        .rank-row {
            display: flex; align-items: center; background: var(--white);
            border: 2px solid var(--dj-purple); border-left: 8px solid var(--dj-purple);
            padding: 12px 15px; font-weight: 900; transition: all 0.2s; flex-shrink: 0; position: relative;
        }
        .daily-list .rank-row { border-left-color: var(--dj-magenta); }
        .giver-list .rank-row { border-left-color: var(--dj-orange); }
        .quest-list .rank-row { border-left-color: var(--dj-cyan); }
        .rank-row:hover { transform: translateX(6px); box-shadow: -2px 5px 0 rgba(53, 28, 97, 0.2); background: #fdfdfd; }

        .rank-row.top-1 { background: linear-gradient(90deg, #fff9e6, #ffffff); border-color: #d4af37; border-left-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .rank-row.top-2 { background: linear-gradient(90deg, #f5f5f5, #ffffff); border-color: #a8a9ad; border-left-color: #a8a9ad; }
        .rank-row.top-3 { background: linear-gradient(90deg, #fff0e6, #ffffff); border-color: #cd7f32; border-left-color: #cd7f32; }

        .rank-row.top-1 .rank-num { color: #d4af37; font-size: 22px; width: 75px; text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
        .rank-row.top-2 .rank-num { color: #a8a9ad; font-size: 22px; width: 75px; }
        .rank-row.top-3 .rank-num { color: #cd7f32; font-size: 22px; width: 75px; }

        .rank-num {
            font-size: 22px; color: #ccc; width: 45px; flex-shrink: 0;
            font-style: italic; font-family: 'Montserrat', sans-serif;
            white-space: nowrap;
        }

        .rank-name { flex: 1; font-size: 18px; color: var(--dj-purple); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }
        .rank-val { font-size: 19px; font-style: italic; font-family: 'Montserrat', sans-serif; text-align: right; white-space: nowrap; }

        .bouncy-text {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s, text-shadow 0.2s;
        }
        .bouncy-text:hover { transform: translateY(-3px) scale(1.05); cursor: pointer; text-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        /* 링크 밑줄 제거 */
        a.link-text { text-decoration: none; color: inherit; }
        
        .val-giver { color: var(--dj-orange); }
        .val-quest { color: var(--dj-cyan); }
        .val-daily { color: var(--dj-magenta); }
        
        .rank-name .bouncy-text:hover { color: var(--dj-magenta); }
        .val-giver .bouncy-text:hover { color: var(--dj-purple); }
        .val-quest .bouncy-text:hover { color: var(--dj-purple); }
        .header h1 .bouncy-text:hover { transform: translateY(-4px) scale(1.02) rotate(-2deg); }

        @media (max-width: 650px) {
            .game-frame { border-width: 6px; border-radius: 12px; }
            .content-wrap { padding: 40px 15px 20px; }
            .hud-side { display: none; }
            .hud-overlay { top: 10px; bottom: 10px; left: 10px; right: 10px; }
            .hud-top { top: 10px; left: 10px; right: 10px; }
            .hud-bottom { bottom: 10px; left: 10px; right: 10px; }
            .header h1 { font-size: 44px; text-shadow: 2px 2px 0 var(--dj-purple), 4px 4px 0 rgba(0,0,0,0.1); }
            .block-cyan { width: 30px; height: 20px; top: -5px; left: -5px; }
            .block-orange { width: 30px; height: 30px; bottom: -5px; right: -5px; }
            .block-lines { display: none; }
            .top-subtitle { font-size: 10px; margin-bottom: 2px; }
            .top-subtitle .barcode { font-size: 10px; }
            .yt-box { margin-bottom: 20px; box-shadow: 4px 4px 0 rgba(53, 28, 97, 0.3), -2px -2px 0 var(--dj-cyan); }
            .yt-box iframe { height: 160px; }
            .tab-menu { gap: 10px; margin-bottom: 15px; }
            .tab-btn { font-size: 13px; padding: 10px 2px; border-width: 2px; box-shadow: 2px 2px 0 var(--dj-purple); transform: skewX(-5deg); }
            .tab-btn span { transform: skewX(5deg); }
            .tab-btn.active { box-shadow: 2px 2px 0 var(--dj-yellow); }
            .tab-btn#btnQuest.active { box-shadow: 2px 2px 0 var(--dj-cyan); }
            .list-container { padding-right: 5px; gap: 6px; }
            .rank-row { padding: 8px 10px; border-width: 1px; border-left-width: 5px; }
            .rank-num { width: 30px; font-size: 15px; }
            .rank-name { font-size: 15px; }
            .rank-val { font-size: 14px; min-width: 80px; }
            .rank-row.top-1 .rank-num, .rank-row.top-2 .rank-num, .rank-row.top-3 .rank-num { font-size: 15px; width: 55px; }
        }
    </style>
</head>
<body>
    <div class="game-frame">
        <div class="hud-overlay">
            <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
            <div class="hud-corner bl"></div><div class="hud-corner br"></div>
            <div class="hud-top">
                <div class="hud-badge">MINERAL STORAGE</div>
                <div class="hud-line"></div>
                <div class="eq-bars">
                    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                </div>
                <div class="hud-cross">+</div>
            </div>
            <div class="hud-bottom">
                <div class="hud-cross">+</div><div class="hud-line"></div>
                <div class="hud-badge" id="update-time">UPDATING...</div>
            </div>
            <div class="hud-side left">S Y S T E M &nbsp; O N L I N E</div>
            <div class="hud-side right">B O O &nbsp; B O A R D &nbsp; R A N K I N G</div>
        </div>

        <div class="content-wrap">
            <div class="top-subtitle">
                <span>YGOSU</span><span class="barcode">|||| || ||| |</span><span>DATA ARCHIVE</span>
            </div>
            <div class="header">
                <div class="block-cyan"></div><div class="block-orange"></div><div class="block-lines"></div>
                <h1><span class="bouncy-text">BOO</span><br><span class="bouncy-text">BOARD</span></h1>
            </div>

            <div class="yt-box">
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/qZlu2j2SiBA?si=dhhYeFagalAQN563&autoplay=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" id="btnDaily" onclick="show('daily')"><span>DAILY QUEST</span></button>
                <button class="tab-btn" id="btnGiver" onclick="show('giver')"><span>DONATION</span></button>
                <button class="tab-btn" id="btnQuest" onclick="show('quest')"><span>QUEST</span></button>
            </div>

            <div id="daily" class="list-container daily-list"></div>
            <div id="giver" class="list-container giver-list" style="display:none;"></div>
            <div id="quest" class="list-container quest-list" style="display:none;"></div>
        </div>
    </div>

<script>
    // ─── 탭 전환 함수 ───
    function show(tab) {
        document.getElementById('daily').style.display = 'none';
        document.getElementById('giver').style.display = 'none';
        document.getElementById('quest').style.display = 'none';

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        if (tab === 'daily') {
            document.getElementById('daily').style.display = 'flex';
            document.getElementById('btnDaily').classList.add('active');
        } else if (tab === 'giver') {
            document.getElementById('giver').style.display = 'flex';
            document.getElementById('btnGiver').classList.add('active');
        } else if (tab === 'quest') {
            document.getElementById('quest').style.display = 'flex';
            document.getElementById('btnQuest').classList.add('active');
        }
    }

    // ─── 랭킹 리스트 생성 함수 (이미지·링크 완전 제거) ───
    function createRows(dataList, typeClass, tabType) {
        if (!dataList || dataList.length === 0) {
            return '<div style="text-align:center; padding:20px; color:#999; font-weight:900;">조건을 달성한 사람이 아직 없습니다.</div>';
        }

        var html = "";
        dataList.forEach(function(r, i) {
            var rankClass = "";
            var rankIcon = String(i + 1).padStart(2, '0');

            if (i === 0) { rankClass = "top-1"; rankIcon = "🥇 01"; }
            else if (i === 1) { rankClass = "top-2"; rankIcon = "🥈 02"; }
            else if (i === 2) { rankClass = "top-3"; rankIcon = "🥉 03"; }

            // 닉네임은 무조건 순수 텍스트 (링크 없음)
            var nameHtml = '<span class="bouncy-text">' + r.name + '</span>';
            
            var valHtml = "";
            if (tabType === 'daily') {
                valHtml = "CLEAR";
            } else {
                valHtml = r.val.toLocaleString() + " MN";
            }

            html += '<div class="rank-row ' + rankClass + '">' +
                    '<div class="rank-num">' + rankIcon + '</div>' +
                    '<div class="rank-name">' + nameHtml + '</div>' +
                    '<div class="rank-val ' + typeClass + '"><span class="bouncy-text">' + valHtml + '</span></div>' +
                    '</div>';
        });
        return html;
    }

    // ─── 데이터 불러오기 ───
    function loadData() {
        fetch('data.json?t=' + new Date().getTime())
        .then(function(response) {
            if (!response.ok) throw new Error('네트워크 응답 실패');
            return response.json();
        })
        .then(function(data) {
            document.getElementById('daily').innerHTML = createRows(data.quest_board, "val-daily", "daily");
            document.getElementById('giver').innerHTML = createRows(data.donation_ranking, "val-giver", "giver");
            document.getElementById('quest').innerHTML = createRows(data.quest_ranking, "val-quest", "quest");

            if (data.updated_at) {
                document.getElementById('update-time').innerText = "LAST UPDATED : " + data.updated_at;
            }
        })
        .catch(function(error) {
            console.error("데이터 로딩 오류:", error);
            document.getElementById('daily').innerHTML = '<div style="text-align:center; padding:20px; color:#999;">데이터를 불러올 수 없습니다.</div>';
            document.getElementById('giver').innerHTML = '<div style="text-align:center; padding:20px; color:#999;">데이터를 불러올 수 없습니다.</div>';
            document.getElementById('quest').innerHTML = '<div style="text-align:center; padding:20px; color:#999;">데이터를 불러올 수 없습니다.</div>';
        });
    }

    window.onload = function() {
        show('daily');
        loadData();
    };
</script>
</body>
</html>

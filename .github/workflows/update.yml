name: Auto Update BOO BOARD

on:
  schedule:
    # 한국 시간 기준 매일 오전 0시(자정) 0분에 자동 실행
    - cron: '0 15 * * *'
  workflow_dispatch: # 우리가 원할 때 버튼을 눌러서 수동으로도 실행할 수 있게 해주는 마법의 주문입니다!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 크롤링 파이썬 스크립트 실행
      run: python booboard.py

    - name: 5. 변경된 index.html을 GitHub에 자동 Push (저장)
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'action@github.com'
        git add index.html
        git commit -m "🚀 Auto update BOO BOARD data" || echo "No changes to commit"
        git push

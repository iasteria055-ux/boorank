name: Midnight FULL Update
on:
  schedule:
    - cron: '0 15 * * *' # 한국시간 매일 밤 12시 00분
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: 🌕 자정 FULL 크롤링 실행
      run: python boo_board.py full
    - name: 깃허브에 저장 (JSON 포함)
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'action@github.com'
        git add index.html mineral_data.json
        git commit -m "🌕 Auto FULL update" || echo "No changes to commit"
        git push
